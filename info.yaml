# Tiny Tapeout project information
project:
  title:        "AXI4-Lite Slave Register Demo"
  author:       "jenny82121027"
  discord:      ""
  description:  "Tiny Tapeout AXI4-Lite slave wrapper with a read-only ID register, 32 registers, and a 16-bit readback path on the bidirectional pins."
  language:     "SystemVerilog"
  clock_hz:     50000000

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x2"

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_jenny82121027_axi4lite"

  # List your project's source files here.
  source_files:
    - "src/tt_um_jenny82121027_axi4lite.sv"
    - "src/axi4_lite_slave.sv"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
pinout:
  # Inputs
  ui[0]: "reg_addr[0]"
  ui[1]: "reg_addr[1]"
  ui[2]: "reg_addr[2]"
  ui[3]: "reg_addr[3]"
  ui[4]: "reg_addr[4]"
  ui[5]: "write_req"
  ui[6]: "read_req"
  ui[7]: "S_BREADY"

  # Outputs
  uo[0]: "rdata[0]"
  uo[1]: "rdata[1]"
  uo[2]: "rdata[2]"
  uo[3]: "rdata[3]"
  uo[4]: "rdata[4]"
  uo[5]: "rdata[5]"
  uo[6]: "rdata[6]"
  uo[7]: "rdata[7]"

  # Bidirectional pins
  uio[0]: "wdata[0] / rdata[8]"
  uio[1]: "wdata[1] / rdata[9]"
  uio[2]: "wdata[2] / rdata[10]"
  uio[3]: "wdata[3] / rdata[11]"
  uio[4]: "wdata[4] / rdata[12]"
  uio[5]: "wdata[5] / rdata[13]"
  uio[6]: "wdata[6] / rdata[14]"
  uio[7]: "wdata[7] / rdata[15]"

# Do not change!
yaml_version: 6
